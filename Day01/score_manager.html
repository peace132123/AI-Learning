<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>学生考试成绩管理系统</title>
  <style>
    :root{--blue:#2563eb;--bg:#f1f5f9;--text:#172033;--muted:#64748b;--line:#dbe3ee;--green:#059669;--red:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 system-ui,"Microsoft YaHei",sans-serif}
    header{background:linear-gradient(120deg,#1d4ed8,#4f46e5);color:#fff;padding:34px 20px}
    header div,main{max-width:1080px;margin:auto}h1{margin:0;font-size:28px}header p{margin:5px 0 0;opacity:.8}
    nav{display:flex;gap:8px;margin:22px 0}.tab{border:0;background:#fff;padding:10px 16px;border-radius:9px;cursor:pointer;color:var(--muted)}
    .tab.active{background:var(--blue);color:#fff}.panel{display:none}.panel.active{display:block}
    .card{background:#fff;border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:0 5px 20px #1e293b0d}
    h2,h3{margin-top:0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    label{display:block;color:var(--muted);font-size:13px;margin-bottom:5px}input{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:15px}
    .actions{display:flex;gap:10px;margin-top:20px}.btn{border:0;border-radius:8px;padding:10px 18px;cursor:pointer;background:var(--blue);color:#fff}.btn.secondary{background:#e2e8f0;color:var(--text)}
    .notice{padding:12px 15px;border-radius:8px;background:#eff6ff;color:#1d4ed8;margin-bottom:16px}.hidden{display:none}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}.metric{padding:13px;background:#f8fafc;border-radius:9px}.metric b{display:block;font-size:20px}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;white-space:nowrap}th,td{text-align:left;padding:11px;border-bottom:1px solid var(--line)}th{background:#f8fafc}
    .up{color:var(--green)}.down{color:var(--red)}.empty{text-align:center;color:var(--muted);padding:35px}
    @media(max-width:700px){.grid,.summary{grid-template-columns:1fr 1fr}nav{overflow:auto}}
  </style>
</head>
<body>
<header><div><h1>🎯 学生考试成绩管理系统</h1><p>成绩录入、对比分析与历史统计</p></div></header>
<main>
  <nav>
    <button class="tab active" data-target="entry">📝 录入成绩</button>
    <button class="tab" data-target="history">📊 历史成绩</button>
    <button class="tab" data-target="stats">🏆 成绩统计</button>
  </nav>

  <section id="entry" class="panel active">
    <form id="scoreForm" class="card">
      <h2>录入考试成绩</h2>
      <div class="grid">
        <div><label for="exam">考试名称</label><input id="exam" placeholder="例如：期中考试"></div>
        <div><label for="语文">语文（0～150）</label><input id="语文" type="number" min="0" max="150" step="0.5" required></div>
        <div><label for="数学">数学（0～150）</label><input id="数学" type="number" min="0" max="150" step="0.5" required></div>
        <div><label for="英语">英语（0～150）</label><input id="英语" type="number" min="0" max="150" step="0.5" required></div>
        <div><label for="物理">物理（0～150）</label><input id="物理" type="number" min="0" max="150" step="0.5" required></div>
        <div><label for="化学">化学（0～150）</label><input id="化学" type="number" min="0" max="150" step="0.5" required></div>
        <div><label for="政治">政治（0～150）</label><input id="政治" type="number" min="0" max="150" step="0.5" required></div>
      </div>
      <div class="actions"><button class="btn">保存并分析</button><button type="reset" class="btn secondary">清空</button></div>
    </form>
    <div id="result" class="card hidden"></div>
  </section>

  <section id="history" class="panel">
    <div class="card"><h2>历史成绩总览</h2><div id="historyTable"></div>
      <div class="actions"><button id="csv" class="btn">导出 CSV</button><button id="clear" class="btn secondary">清空全部记录</button></div>
    </div>
  </section>
  <section id="stats" class="panel"><div class="card"><h2>成绩统计</h2><div id="statistics"></div></div></section>
</main>
<script>
const subjects=["语文","数学","英语","物理","化学","政治"];
const key="examScoreRecords";
const read=()=>JSON.parse(localStorage.getItem(key)||"[]");
const write=data=>localStorage.setItem(key,JSON.stringify(data));
const fmt=n=>Number(n).toFixed(1);

document.querySelectorAll(".tab").forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll(".tab,.panel").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");document.getElementById(btn.dataset.target).classList.add("active");
  render();
});

document.getElementById("scoreForm").onsubmit=e=>{
  e.preventDefault();
  const records=read(), now=new Date();
  const item={考试名称:document.getElementById("exam").value.trim()||
    `考试_${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}`};
  subjects.forEach(s=>item[s]=Number(document.getElementById(s).value));
  const previous=records.at(-1);records.push(item);write(records);showComparison(item,previous);e.target.reset();render();
};

function showComparison(current,previous){
  const box=document.getElementById("result");box.classList.remove("hidden");
  if(!previous){
    box.innerHTML=`<h2>第 1 次考试记录</h2><div class="notice">这是第一次考试，无历史数据可对比。</div>${scoreTable(current)}`;return;
  }
  let total=0,up=0,down=0;
  const rows=subjects.map(s=>{const d=current[s]-previous[s];total+=d;if(d>0)up++;if(d<0)down++;
    return `<tr><td>${s}</td><td>${fmt(current[s])}</td><td>${fmt(previous[s])}</td><td class="${d>0?"up":d<0?"down":""}">${d>0?"+":""}${fmt(d)} ${d>0?"↑ 进步":d<0?"↓ 退步":"→ 持平"}</td></tr>`}).join("");
  const avg=total/subjects.length,comment=avg>5?"🎉 总体表现优秀，继续保持！":avg>0?"👍 略有进步，再接再厉！":avg>-5?"🤔 略有退步，需要加油！":"💪 退步较大，要更加努力了！";
  box.innerHTML=`<h2>成绩对比分析</h2><p>当前考试：<b>${esc(current.考试名称)}</b>　上次考试：${esc(previous.考试名称)}</p>
  <div class="summary"><div class="metric">进步科目<b class="up">${up}</b></div><div class="metric">退步科目<b class="down">${down}</b></div><div class="metric">总分变化<b>${total>=0?"+":""}${fmt(total)}</b></div><div class="metric">平均变化<b>${avg>=0?"+":""}${fmt(avg)}</b></div></div>
  <div class="notice">${comment}</div><div class="table-wrap"><table><thead><tr><th>科目</th><th>本次成绩</th><th>上次成绩</th><th>变化趋势</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function scoreTable(x){return `<div class="table-wrap"><table><tr>${subjects.map(s=>`<th>${s}</th>`).join("")}</tr><tr>${subjects.map(s=>`<td>${fmt(x[s])}</td>`).join("")}</tr></table></div>`}
function render(){
  const data=read(),host=document.getElementById("historyTable");
  host.innerHTML=!data.length?`<div class="empty">暂无考试记录</div>`:`<div class="table-wrap"><table><thead><tr><th>考试名称</th>${subjects.map(s=>`<th>${s}</th>`).join("")}<th>总分</th></tr></thead><tbody>${data.map(x=>`<tr><td>${esc(x.考试名称)}</td>${subjects.map(s=>`<td>${fmt(x[s])}</td>`).join("")}<td>${fmt(subjects.reduce((a,s)=>a+x[s],0))}</td></tr>`).join("")}</tbody></table></div>`;
  const stats=document.getElementById("statistics");
  stats.innerHTML=!data.length?`<div class="empty">录入成绩后显示统计结果</div>`:`<div class="table-wrap"><table><thead><tr><th>科目</th><th>平均分</th><th>最高分</th><th>最高分考试</th></tr></thead><tbody>${subjects.map(s=>{const max=Math.max(...data.map(x=>x[s])),best=data.find(x=>x[s]===max);return `<tr><td>${s}</td><td>${fmt(data.reduce((a,x)=>a+x[s],0)/data.length)}</td><td>${fmt(max)}</td><td>${esc(best.考试名称)}</td></tr>`}).join("")}</tbody></table></div>`;
}
document.getElementById("csv").onclick=()=>{
  const data=read();if(!data.length)return alert("暂无可导出的成绩记录。");
  const rows=[["考试名称",...subjects],...data.map(x=>[x.考试名称,...subjects.map(s=>x[s])])];
  const csv="\ufeff"+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")).join("\r\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="exam_scores.csv";a.click();URL.revokeObjectURL(a.href);
};
document.getElementById("clear").onclick=()=>{if(confirm("确定清空全部成绩记录吗？")){localStorage.removeItem(key);render()}};
function esc(v){const d=document.createElement("div");d.textContent=v;return d.innerHTML}
render();
</script>
</body>
</html>
